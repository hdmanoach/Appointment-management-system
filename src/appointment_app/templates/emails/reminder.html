<!doctype html>
<html lang="fr">
  <body style="margin:0;padding:0;background:#f6f6f6;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#c96f3d;color:#ffffff;padding:14px 18px;font-size:18px;font-weight:700;">
                Rappel de rendez-vous
              </td>
            </tr>
            <tr>
              <td style="padding:18px;line-height:1.5;">
                <p style="margin:0 0 12px;">Bonjour {{ customer_name }},</p>
                <p style="margin:0 0 12px;">Ceci est un rappel de votre rendez-vous.</p>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#fff7f2;border:1px solid #f1d5c5;border-radius:10px;">
                  <tr>
                    <td style="padding:10px 12px;"><strong>Entreprise</strong></td>
                    <td style="padding:10px 12px;">{{ company_name }}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 12px;"><strong>Date/heure</strong></td>
                    <td style="padding:10px 12px;">{{ start_at_str }}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 12px;"><strong>Statut</strong></td>
                    <td style="padding:10px 12px;">{{ status }}</td>
                  </tr>
                </table>
                <p style="margin:14px 0 0;">Merci.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

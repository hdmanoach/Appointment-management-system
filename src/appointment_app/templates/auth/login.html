{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
  <section class="mx-auto max-w-xl rounded-2xl border border-teal-900/10 bg-white p-6 shadow-sm">
    <h1 class="font-display text-5xl text-brandDark">Connexion</h1>
    <p class="mt-1 text-sm text-slate-600">Accede a ton espace client ou entreprise.</p>

    <div class="mt-4 flex flex-wrap gap-2">
      <a class="rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50" href="{{ url_for('auth.google_login') }}">Google</a>
      <a class="rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50" href="{{ url_for('auth.github_login') }}">GitHub</a>
    </div>

    <form class="mt-4 space-y-3" method="post">
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase text-slate-500">Email</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" type="email" name="email" required>
      </div>
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase text-slate-500">Mot de passe</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" type="password" name="password" required>
      </div>
      <button class="w-full rounded-lg bg-brand px-3 py-2 text-sm font-semibold text-white hover:bg-brandDark" type="submit">Se connecter</button>
    </form>
  </section>
{% endblock %}

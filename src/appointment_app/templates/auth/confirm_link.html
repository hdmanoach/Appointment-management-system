{% extends "base.html" %}

{% block title %}Confirmer la liaison{% endblock %}

{% block content %}
  <section class="mx-auto max-w-xl rounded-2xl border border-teal-900/10 bg-white p-6 shadow-sm">
    <h1 class="font-display text-4xl text-brandDark">Confirmer la liaison {{ provider|capitalize }}</h1>
    <p class="mt-2 text-sm text-slate-600">
      Un compte local existe deja pour <strong>{{ email }}</strong>. Saisis le mot de passe pour securiser la liaison.
    </p>

    <form class="mt-4 space-y-3" method="post">
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase text-slate-500">Mot de passe local</label>
        <input class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" type="password" name="password" required>
      </div>
      <button class="w-full rounded-lg bg-brand px-3 py-2 text-sm font-semibold text-white hover:bg-brandDark" type="submit">Confirmer la liaison</button>
    </form>

    <a class="mt-3 inline-flex rounded-full border border-slate-300 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50" href="{{ url_for('auth.cancel_link') }}">Annuler</a>
  </section>
{% endblock %}
